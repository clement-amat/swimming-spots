name: Claude Fix (comment trigger)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read
  checks: read

jobs:
  gate:
    name: gate
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude fix') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      error_context: ${{ steps.ctx.outputs.error_context }}
    steps:
      - name: Acknowledge with eyes reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Gather PR + failing checks context
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            core.setOutput('pr_number', String(prNumber));

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const headSha = pr.head.sha;

            // Extract anything the user wrote after "@claude fix" as freeform context
            const body = context.payload.comment.body || '';
            const m = body.match(/@claude fix\s*([\s\S]*)/i);
            const userHint = (m && m[1] ? m[1].trim() : '');

            // Failing check runs on the PR head
            const { data: checkData } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
              per_page: 100,
            });

            const failing = (checkData.check_runs || []).filter(
              cr => cr.conclusion && ['failure', 'cancelled', 'timed_out', 'action_required'].includes(cr.conclusion)
            );

            // Failing statuses (older API, still common for some CIs)
            const { data: statusData } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha,
            });
            const failingStatuses = (statusData.statuses || []).filter(s => s.state === 'failure' || s.state === 'error');

            const lines = [];
            lines.push(`PR #${prNumber} — head ${headSha.substring(0, 8)} on \`${pr.head.ref}\``);
            lines.push(`Title: ${pr.title}`);
            lines.push('');
            if (userHint) {
              lines.push('## Hint from commenter');
              lines.push(userHint);
              lines.push('');
            }
            if (failing.length === 0 && failingStatuses.length === 0) {
              lines.push('No failing check runs or statuses detected on the head commit.');
              lines.push('Try running `yarn build` and `yarn test` locally and address whatever fails.');
            } else {
              lines.push('## Failing checks');
              for (const cr of failing) {
                lines.push(`- ${cr.name} (conclusion: ${cr.conclusion}) — ${cr.html_url}`);
              }
              for (const s of failingStatuses) {
                lines.push(`- ${s.context} (state: ${s.state}) — ${s.target_url || 'no url'}`);
              }
            }

            core.setOutput('error_context', lines.join('\n'));

  run-fix:
    needs: gate
    uses: ./.github/workflows/claude-fix.yml
    with:
      pr_number: ${{ fromJSON(needs.gate.outputs.pr_number) }}
      error_context: ${{ needs.gate.outputs.error_context }}
    secrets: inherit

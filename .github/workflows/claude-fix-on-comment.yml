name: Claude Fix (comment trigger)

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read
  checks: read

jobs:
  gate:
    name: gate
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude fix') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      error_context: ${{ steps.ctx.outputs.error_context }}
    steps:
      - name: Acknowledge with eyes reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Gather PR + failing checks context
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            core.setOutput('pr_number', String(prNumber));

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const headSha = pr.head.sha;

            // Extract anything the user wrote after "@claude fix" as freeform context
            const body = context.payload.comment.body || '';
            const m = body.match(/@claude fix\s*([\s\S]*)/i);
            const userHint = (m && m[1] ? m[1].trim() : '');

            // Most recent failed workflow run on this head SHA
            const { data: wfRuns } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: headSha,
              status: 'failure',
              per_page: 5,
            });
            const lastFailedRun = (wfRuns.workflow_runs || [])[0] || null;

            const lines = [];
            lines.push(`PR #${prNumber} — head ${headSha.substring(0, 8)} on \`${pr.head.ref}\``);
            lines.push(`Title: ${pr.title}`);
            lines.push('');
            if (userHint) {
              lines.push('## Hint from commenter');
              lines.push(userHint);
              lines.push('');
            }

            if (!lastFailedRun) {
              lines.push('No failed workflow run found on the head commit. Inspect the PR checks directly.');
            } else {
              lines.push(`## Failed workflow run`);
              lines.push(`- ${lastFailedRun.name} #${lastFailedRun.run_number} — ${lastFailedRun.html_url}`);

              const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: lastFailedRun.id,
                per_page: 100,
              });
              const failedJobs = (jobs.jobs || []).filter(j => j.conclusion === 'failure');

              lines.push('');
              lines.push('## Failed jobs');
              for (const j of failedJobs) {
                lines.push(`- ${j.name} — ${j.html_url}`);
                for (const s of (j.steps || []).filter(s => s.conclusion === 'failure')) {
                  lines.push(`    - step: ${s.name}`);
                }
              }

              const MAX_LINES_PER_JOB = 200;
              const MAX_CHARS_TOTAL = 12000;
              let charBudget = MAX_CHARS_TOTAL;
              for (const j of failedJobs) {
                if (charBudget <= 0) break;
                lines.push('');
                lines.push(`## Log tail — job \`${j.name}\``);
                lines.push('```');
                try {
                  const r = await github.rest.actions.downloadJobLogsForWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    job_id: j.id,
                  });
                  const text = typeof r.data === 'string' ? r.data : Buffer.from(r.data).toString('utf8');
                  let tail = text.split('\n').slice(-MAX_LINES_PER_JOB).join('\n');
                  if (tail.length > charBudget) tail = tail.slice(tail.length - charBudget);
                  charBudget -= tail.length;
                  lines.push(tail);
                } catch (e) {
                  lines.push(`(could not fetch logs: ${e.message})`);
                }
                lines.push('```');
              }
            }

            core.setOutput('error_context', lines.join('\n'));

  run-fix:
    needs: gate
    uses: ./.github/workflows/claude-fix.yml
    with:
      pr_number: ${{ fromJSON(needs.gate.outputs.pr_number) }}
      error_context: ${{ needs.gate.outputs.error_context }}
    secrets: inherit

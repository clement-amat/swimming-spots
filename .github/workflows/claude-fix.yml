name: Claude Fix (reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        description: PR number to fix
        required: true
        type: number
      error_context:
        description: Error context / failure logs to give Claude
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read
  checks: read

jobs:
  fix:
    name: claude-fix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve PR head ref
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }},
            });
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('is_fork', String(pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`));

      - name: Refuse to run on fork PRs
        if: steps.pr.outputs.is_fork == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
              body: '@claude fix is disabled for fork PRs (no write access to the head branch). Please push the branch to this repo and retry.',
            });
            core.setFailed('Fork PR not supported');

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Label PR as claude-touched
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'claude-touched',
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'claude-touched',
                  color: 'B084F5',
                  description: 'PR touched by the Claude fix workflow',
                });
              } else {
                throw e;
              }
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
              labels: ['claude-touched'],
            });

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn

      - name: Install deps (frozen)
        run: yarn install --frozen-lockfile

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'dependabot'
          show_full_output: 'true'
          prompt: |
            You are fixing a failing CI on pull request #${{ inputs.pr_number }} in the swimming-spots Angular 19 app.

            ## Failure context (read this FIRST)

            ${{ inputs.error_context }}

            The failure logs above are the source of truth. Do NOT re-run `yarn build` to discover the problem — it is already in the context. Use the logs to identify the failing file(s) and the exact error message.

            ## Hard constraints — read these BEFORE planning a fix

            **You may only modify files under these paths:**
            - `src/**`     (Angular app code)
            - `api/**`     (server endpoints)
            - `scripts/**` (build/dev scripts)
            - `public/**`  (static assets, data files)

            **You must NOT modify (under any circumstances):**
            - `package.json`, `yarn.lock`        (dependencies — out of scope for CI fixes)
            - `.github/**`                       (workflows / configuration)
            - `angular.json`, `tsconfig*.json`   (build config)
            - `vercel.json`, `.postcssrc.json`   (deploy / postcss config)
            - any other file at the repo root not listed in the allowed paths

            ## Decide first: is this fix in scope?

            Read the failure log and answer YES or NO to: "can I fix this by changing only files under the allowed paths?"

            ### If NO (fix requires forbidden files — e.g. dep bump fallout, broken config, missing dep)

            STOP. Do not modify anything. Post a single PR comment with:
            - The file(s) that would need to change
            - The exact change needed
            - Why the allowed scope cannot fix it

            Then exit. Do not run `yarn build`, do not edit, do not commit.

            ### If YES (fix is genuinely in `src/**` / `api/**` / `scripts/**` / `public/**`)

            1. Apply the minimal code edit.
            2. Run `yarn build` ONCE to verify the fix compiles.
            3. If `yarn build` still fails, do NOT iterate more than twice. If still red after a second attempt, follow the NO path and comment about it.
            4. Commit and push to the PR head branch (`${{ steps.pr.outputs.head_ref }}`).
            5. Post one short PR comment summarising what you changed and why.

            ## Style

            - Follow `AGENTS.md` conventions (Angular signals, standalone components, no comments in code, mobile + desktop, SEO-aware).
            - Smallest possible diff. No refactors, no drive-by cleanups.
          claude_args: |
            --allowed-tools "Bash,Edit,Read,Write,Glob,Grep"

@if (hasImages()) {
<section class="bg-white dark:bg-card-dark p-8 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
  <div class="flex justify-between items-end mb-6">
    <h2 class="text-xl font-extrabold text-slate-800 dark:text-white font-display">Galerie Photos</h2>
    @if (hasMoreImages()) {
    <button class="text-primary font-bold text-sm hover:underline">
      Voir les {{ totalImages() }} photos
    </button>
    }
  </div>
  <div class="grid grid-cols-3 gap-4">
    @for (image of displayedImages(); track image.url; let i = $index; let last = $last) {
    <div class="relative group cursor-pointer h-48">
      <img [alt]="image.title || spotName()" [src]="image.url"
        class="w-full h-full object-cover rounded-2xl shadow-sm hover:opacity-90 transition-opacity" />
      @if (last && hasMoreImages()) {
      <div
        class="absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center text-white font-bold group-hover:bg-black/50 transition-all">
        +{{ remainingCount() }} photos
      </div>
      }
    </div>
    }
  </div>
</section>
}

@if (swimmingSpot(); as spot) {
<div class="swimming-spot-detail-wrapper">
  @if (images().length) {
  <div class="p-4">
    <div class="images-grid" [attr.data-count]="images().length">
      <div class="image-item" *ngFor="let image of images(); let i = index" (click)="navigateToGallery()">
        <img [alt]="image.title || spot.name" [src]="image.url" />
        @if (spot.images && spot.images.length > 3 && i === 0) {
        <div class="image-badge cursor-pointer">
          <span class="material-symbols-outlined">photo_library</span>
          {{ spot.images.length }} Photos
        </div>
        }
      </div>
    </div>
  </div>
  }

  <div class="px-6 pb-28 flex-1" [class.pt-8]="images().length === 0">
    <div class="flex flex-wrap gap-2 mb-4">
      <app-spot-water-quality-chip [quality]="spot.siteDetails?.lastWaterQuality"></app-spot-water-quality-chip>
    </div>
    <h1 class="text-2xl font-extrabold text-slate-800 dark:text-white mb-2 leading-tight font-display">
      {{ spot.name }}
    </h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mb-8 flex items-center gap-1">
      <span class="material-symbols-outlined text-base text-primary">location_on</span>
      {{ spot | spotLocation:true }}
    </p>

    <div class="grid grid-cols-3 gap-3 mb-8">
      <app-stat-card [emoji]="spotLabel().emoji" [value]="spotLabel().title"
        [label]="spotLabel().subtitle"></app-stat-card>
      <app-stat-card icon="health_and_safety" value="Maîtres-Nageurs" label="Sur place"
        [class.opacity-30]="!spot.siteDetails?.lifeguard"></app-stat-card>
      <app-stat-card icon="chair_umbrella" value="Aménagé" label="Équipements"
        [class.opacity-30]="!spot.siteDetails?.amenities"></app-stat-card>
    </div>

    @if (spot.siteDetails) {
    <div class="mb-8">
      <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-4">Détails</h3>
      <app-spot-facilities [siteDetails]="spot.siteDetails"></app-spot-facilities>
    </div>
    }
  </div>

  <div
    class="sticky bottom-0 bg-sidebar-bg/95 dark:bg-slate-900/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 p-4 flex justify-between items-center gap-3">
    <button
      type="button"
      (click)="shareSpot()"
      aria-label="Partager ce spot"
      class="cursor-pointer flex flex-col items-center justify-center py-2 text-slate-500 dark:text-slate-400 hover:text-primary transition-colors">
      <span class="material-symbols-outlined font-light">share</span>
      <span class="text-[10px] font-bold mt-1">Partager</span>
    </button>
    <a [href]="spot | googleMapsUrl" target="_blank" rel="noopener noreferrer"
      (click)="trackDirections()"
      class="group cursor-pointer bg-primary hover:bg-opacity-90 active:scale-95 text-white font-bold text-sm py-3.5 px-6 rounded-2xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 transition-all duration-200">
      <span
        class="material-symbols-outlined text-xl transition-transform duration-200 group-hover:translate-x-0.5">directions</span>
      Obtenir les directions
    </a>
  </div>
</div>
}

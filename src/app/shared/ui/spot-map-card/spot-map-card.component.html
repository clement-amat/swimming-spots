<section
  class="bg-white dark:bg-card-dark p-2 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden">
  <div class="relative h-[300px] w-full rounded-lg overflow-hidden group bg-slate-200 dark:bg-slate-700">
    <img [src]="mapImageUrl()" alt="Carte du lieu" class="absolute inset-0 w-full h-full object-cover" />

    <!-- Coordinates -->
    <div class="absolute bottom-4 left-4">
      <div
        class="bg-white/95 dark:bg-slate-900/95 backdrop-blur-md px-3 py-1.5 rounded-xl shadow-xl border border-slate-200/50 dark:border-slate-700/50">
        <span class="text-[10px] font-mono text-slate-500">{{ coordinates() }}</span>
      </div>
    </div>
  </div>
</section>

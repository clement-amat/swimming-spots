<div class="spot-detail-page">
  <div class="absolute z-[1] left-0 flex justify-end p-6">
    <button class="btn-tonal" (click)="goBack()" aria-label="Fermer">
      <span class="material-symbols-outlined text-sm">arrow_back</span>
    </button>
  </div>

  <div [class.mt-12]="!swimmingSpot?.images?.length">
    @if (loading) {
    <div class="loading-container">
      <p>Chargement...</p>
    </div>
    } @else if (swimmingSpot) {
    <app-swimming-spot-detail [swimmingSpot]="swimmingSpot"></app-swimming-spot-detail>
    } @else {
    <div class="error-container">
      <p>Spot de baignade introuvable</p>
      <button class="back-link" (click)="goBack()">Retour à la carte</button>
    </div>
    }
  </div>
</div>

<div class="drawer-overlay" [class.open]="isOpen()" (click)="closeDrawer.emit()">
  <div
    class="drawer-container w-[440px] bg-sidebar-bg dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 overflow-y-auto custom-scrollbar flex flex-col z-10"
    [class.open]="isOpen()" (click)="$event.stopPropagation()">
    @if (lightSpot(); as light) {
    <div class="absolute z-[1] right-0 flex justify-end p-6">
      <a class="btn-tonal mr-2" [routerLink]="['/spot', light.slug]" aria-label="Ouvrir la page détail">
        <span class="material-symbols-outlined text-sm">open_in_new</span>
      </a>
      <button class="btn-tonal" (click)="onCloseClick($event)" aria-label="Fermer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    @defer (when !!swimmingSpot(); prefetch on idle) {
      @if (swimmingSpot(); as spot) {
        <app-swimming-spot-detail [swimmingSpot]="spot"></app-swimming-spot-detail>
      }
    } @placeholder {
      <div class="p-6 pt-20 animate-pulse" aria-busy="true" aria-live="polite">
        <div class="h-7 w-3/4 bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
        <div class="h-4 w-1/2 bg-slate-200 dark:bg-slate-700 rounded mb-6">
        </div>
        <div class="h-48 w-full bg-slate-200 dark:bg-slate-700 rounded mb-4"></div>
        <div class="h-4 w-full bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
        <div class="h-4 w-5/6 bg-slate-200 dark:bg-slate-700 rounded mb-2"></div>
        <div class="h-4 w-2/3 bg-slate-200 dark:bg-slate-700 rounded"></div>
        <p class="sr-only">Chargement des détails de {{ light.name }}…</p>
      </div>
    }
    }
  </div>
</div>
